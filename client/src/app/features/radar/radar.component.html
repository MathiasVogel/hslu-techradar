<div class="min-h-screen bg-base-200 p-4 md:p-8 flex flex-col items-center">
  <h1 class="text-3xl font-black mb-12 uppercase tracking-tighter text-primary">Tech "Radar"</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-2 w-full max-w-6xl">

    @for (catName of categories; track catName) {
      <div class="bg-base-100 shadow-xl p-4 flex flex-col border border-base-300">
        <h2 class="text-l font-black uppercase mb-4 opacity-40 tracking-widest">
          {{ labelMap[catName] }}
        </h2>

        <div class="flex flex-col gap-1 flex-grow">
          @for (ringName of rings; track ringName) {
            <div class="p-3 min-h-[80px] transition-colors"
                 [ngClass]="{
                   'bg-primary/10': ringName === 'ADOPT',
                   'bg-primary/5': ringName === 'TRIAL',
                   'bg-base-200/50': ringName === 'ASSESS',
                   'bg-base-300/30': ringName === 'HOLD'
                 }">
              <span class="text-xs font-bold uppercase opacity-30">{{ labelMap[ringName] }}</span>

              <div class="flex flex-wrap gap-2 mt-2">
                @for (blip of getBlipsForCell(catName, ringName); track blip.id) {
                  <button (click)="openDialog(blip)"
                          class="btn btn-xs btn-primary shadow-sm hover:scale-110 transition-transform">
                    {{ blip.name }}
                  </button>
                }
              </div>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>

<app-tech-detail
  [technologie]="selectedTechnologie"
  [labelMap]="labelMap">
</app-tech-detail>
