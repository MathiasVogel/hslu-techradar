<dialog id="radar_modal" class="modal">
  <div class="modal-box border-t-8 border-primary max-w-2xl">
    <h3 class="font-bold text-lg mb-4">
      {{ editData() ? 'Technologie bearbeiten' : 'Neue Technologie erfassen' }}
    </h3>

    <form [formGroup]="techForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
      <fieldset class="fieldset">

        <label class="label">Name</label>
        <input type="text" class="input input-bordered w-full"
               placeholder="z.B. ArgoCD" formControlName="name"/>

        <label class="label">Kategorie</label>
        <select class="select select-bordered w-full" formControlName="category">
          <option value="" disabled selected>Kategorie wählen</option>
          @for (cat of CATEGORIES; track cat) {
            <option [value]="cat">{{ cat | techLabel }}</option>
          }
        </select>

        <label class="label">Ring</label>
        <select class="select select-bordered w-full" formControlName="ring">
          <option value="" disabled selected>Ring wählen</option>
          @for (ring of RINGS; track ring) {
            <option [value]="ring">{{ ring | techLabel }}</option>
          }
        </select>

        <label class="label">Beschreibung Technologie</label>
        <textarea
          class="textarea textarea-bordered w-full h-24"
          placeholder="Allgemeine Infos zur Technologie..."
          formControlName="description">
        </textarea>

        <label class="label">Beschreibung der Einordnung (Begründung)</label>
        <textarea
          class="textarea textarea-bordered w-full h-24"
          placeholder="Warum wählen wir diesen Ring?"
          formControlName="justification">
        </textarea>

        <div class="modal-action">
          <button type="button" class="btn" (click)="closeModal()" autofocus>Abbrechen</button>
          <button type="submit" [disabled]="techForm.invalid" class="btn btn-primary">
            {{ editData() ? 'Speichern' : 'Erstellen' }}
          </button>
        </div>
      </fieldset>
    </form>
  </div>
</dialog>
